# Deploys the Next.js static export from "stitch 2/web" to GitHub Pages.
# If your repository root is only the Next app, change APP_DIR below to "." and
# update paths in this file accordingly.

name: Deploy ArchitectCore to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "stitch 2/web/**"
      - ".github/workflows/deploy-architectcore-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: architectcore-pages-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: "stitch 2/web"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Compute BASE_PATH for GitHub Pages
        id: pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "User or organization site: no base path."
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "Project site: base path /${REPO}"
            echo "base_path=/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Lint and static export
        working-directory: ${{ env.APP_DIR }}
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIR }}/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
